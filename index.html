<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tegents</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Tegents</h2>

<button id="dailyChat">💬 Daily Chat</button>

<button id="grammarFix">✏️ Grammar Fix</button>

<button id="vocabulary">📚 Vocabulary</button>

<button id="interviewPrep">🎯 Interview Prep</button>

<button id="confidence">🔥 Build Confidence</button>

<button id="themeBtn">🌙 Dark Mode</button>

<div class="profile">

<h3>👤 Vijay</h3>

<p>English Learner</p>

</div>

<div class="progress-box">

<h3>📈 Progress</h3>

<p id="progressCount">0 Messages</p>

</div>

</div>

<div class="main">

<h1 id="welcomeText">Hello, I'm Tegents</h1>

<h3 id="streakCount">🔥 1 Day Streak</h3>

<button id="clearBtn">🗑️ Clear Chat</button>

<p>Your AI Communication Coach</p>



<div class="challenge-card">

<h3>🎯 Daily Challenge</h3>

<p id="dailyChallenge">

Introduce yourself in 3 English sentences.

</p>

</div>

<div id="chatBox"></div>

<div class="inputArea">

<input
id="message"
type="text"
placeholder="Type your message..."
>

<button id="micBtn">

🎤

</button>

<button id="sendBtn">

Send

</button>

</div>

</div>

</div>

<script src="js/app.js"></script>

<script src="js/profile.js"></script>

<script src="js/progress.js"></script>

<script src="js/voice.js"></script>

<script src="js/streak.js"></script>

</body>

</html>
